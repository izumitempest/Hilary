services:
  # Backend API service
  - type: web
    name: hilary-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: CORS_ORIGINS
        value: https://hilary-frontend.onrender.com
      - key: VISION_PROVIDER
        value: groq
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_VISION_MODEL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend static site
  - type: web
    name: hilary-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hilary-api
          property: url
